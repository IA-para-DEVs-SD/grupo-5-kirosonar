## RabbitMQ Configuration - ERP Gráficas Expressas

# Networking
listeners.tcp.default = 5672
management.tcp.port = 15672

# Persistence: messages survive broker restart (queues declared durable by app)
queue_index_embed_msgs_below = 4096

# Memory: trigger flow control at 40% of available RAM
vm_memory_high_watermark.relative = 0.4

# Disk: trigger flow control when free space drops below 1 GB
disk_free_limit.absolute = 1GB

# Heartbeat: detect dead connections after 60 seconds
heartbeat = 60

# Channel limit
channel_max = 2047

# Logging
log.console = true
log.console.level = warning
log.file = false
